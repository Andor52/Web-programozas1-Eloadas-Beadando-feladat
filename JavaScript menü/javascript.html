    <header>

        <form>
            <h3>Új hajó hozzáadása / szerkesztése</h3>
            <label for="">Hajó neve</label><br>

            <input type="text" id="Varos" placeholder="Város">
            <br>
            <button id="submit" class="submit">Küldés</button>
            <button id="reset" class="reset">Alaphelyzet</button><br><br>

            <h3>Hajók listája</h3>
            <table>
                <thead>   
                    <tr>
                        <th>Hajó neve</th>
                        <th>Város</th>
                        <th>Műveletek</th>
                    </tr>
                </thead>
                <tbody id="tabla"></tbody>
            </table>

        </form>

    </main>
